name: lake build

on:
  push:
    branches: [main]
    paths:
      - '**/*.lean'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**/*.lean'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- --default-toolchain none -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache elan toolchains
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ hashFiles('lean-toolchain') }}

      - name: Cache lake build artifacts
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Build
        run: lake build
